# ============================================================================
#  O Traefik da Coolify remove o prefixo /mentoria antes de chegar aqui
#  (middleware stripprefix). Então TODAS as rotas abaixo são relativas à raiz:
#  o browser pede /mentoria/video/x.webm e o nginx recebe /video/x.webm.
#  Ver a nota no Dockerfile.
# ============================================================================
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml application/xml;

    # Headers de segurança básicos
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Assets versionados do Next: cache longo e imutável
    location /_next/static/ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # Mídia (vídeo do depoimento, marca, og:image): cache longo, mas revalidável.
    # Não são versionados por hash, então nada de `immutable` — se um deles for
    # trocado, o cliente precisa poder pegar a versão nova.
    location ~* \.(webm|mp4|webp|jpg|png|svg)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        try_files $uri =404;
    }

    # O HTML NÃO pode ser cacheado. O lote vigente é corrigido no cliente, mas o
    # HTML servido tem que ser sempre o do último build — senão, depois de trocar
    # um preço e redeployar, um cache velho continuaria entregando a página antiga.
    location = / {
        add_header Cache-Control "no-cache, must-revalidate" always;
        try_files /index.html =404;
    }

    # Servir o site estático
    location / {
        try_files $uri $uri/ $uri/index.html =404;
    }

    error_page 404 /404.html;
}
