server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml application/xml;

    # Headers de segurança básicos
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Assets versionados do Next: cache longo e imutável
    location /mentoria/_next/static/ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # O HTML NÃO pode ser cacheado. O lote vigente é corrigido no cliente, mas o
    # HTML servido tem que ser sempre o do último build — senão, depois de trocar
    # um link de checkout e redeployar, um cache velho continuaria entregando a
    # página antiga (com o botão apontando pro lugar errado).
    location = /mentoria/ {
        add_header Cache-Control "no-cache, must-revalidate" always;
        try_files /mentoria/index.html =404;
    }

    # /mentoria (sem barra) -> /mentoria/ (canônico, trailingSlash:true)
    location = /mentoria {
        return 308 /mentoria/;
    }

    # Servir o site estático
    location / {
        try_files $uri $uri/ $uri/index.html =404;
    }

    error_page 404 /mentoria/404.html;
}
